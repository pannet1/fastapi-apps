<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Trading Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #eaeaea; }
    
    /* Common Header */
    .app-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.1); }
    .header-left { display: flex; align-items: center; gap: 0.5rem; }
    .logo { font-size: 1.5rem; }
    .title { font-size: 1.25rem; font-weight: 600; }
    .header-right { display: flex; gap: 0.5rem; }
    .icon-btn { background: rgba(255,255,255,0.1); border: none; padding: 0.5rem; border-radius: 8px; cursor: pointer; font-size: 1.2rem; transition: all 0.2s; }
    .icon-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    
    /* Common Body/Footer */
    .app-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .app-footer { padding: 0.75rem 1.5rem; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1); text-align: center; font-size: 0.75rem; color: #6b7280; }
    .app-footer a { color: #6b7280; text-decoration: none; }
    .app-footer a:hover { color: #9ca3af; }
    
    /* Logic Page Specific */
    .app-content { width: 100%; max-width: 800px; }
    .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
    .card-title { font-size: 0.75rem; text-transform: uppercase; color: #6b7280; margin-bottom: 0.5rem; }
    .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    .data-item { text-align: center; }
    .data-value { font-size: 1.5rem; font-weight: 700; }
    .data-value.positive { color: #00ff88; }
    .data-value.negative { color: #ff4757; }
    .market-data { margin-top: 1rem; }
    .market-item { display: flex; justify-content: space-between; padding: 0.75rem; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 0.5rem; }
    .symbol { font-weight: 600; color: #00d9ff; }
    .price { font-family: monospace; }
    .vol { color: #6b7280; font-size: 0.85rem; }
    
    /* Common Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: rgba(30,30,50,0.95); border-radius: 16px; padding: 2rem; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .modal-title { font-size: 1.25rem; font-weight: 600; }
    .modal-close { background: none; border: none; color: #9ca3af; font-size: 1.5rem; cursor: pointer; padding: 0.25rem; }
    .modal-close:hover { color: white; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; margin-bottom: 0.5rem; color: #9ca3af; font-size: 0.875rem; }
    .form-input { width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 1rem; }
    .form-input:focus { outline: none; border-color: #3b82f6; }
    .btn-primary { width: 100%; padding: 0.75rem; background: #3b82f6; border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .btn-primary:hover { background: #2563eb; }
    .log-content { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: #9ca3af; }
  </style>
</head>
<body>
  <!-- Common Header -->
  <header class='app-header'>
    <div class='header-left'>
      <span class='logo'>📈</span>
      <span class='title'>Trading Bot</span>
    </div>
    <div class='header-right'>
      <button class='icon-btn' onclick='openSettingsModal()' title='Settings'>⚙️</button>
      <button class='icon-btn' onclick='restartLogic()' title='Restart'>🔄</button>
      <button class='icon-btn' onclick='openLogsModal()' title='Logs'>📋</button>
    </div>
  </header>

  <!-- Logic Page Content -->
  <div class='app-body' id='appBody'>
    <div class='app-content'>
      <div class='data-grid'>
        <div class='card'>
          <div class='card-title'>Total P&L</div>
          <div class='data-item'>
            <div class='data-value' id='pnl'>₹0.00</div>
          </div>
        </div>
        <div class='card'>
          <div class='card-title'>Trade Count</div>
          <div class='data-item'>
            <div class='data-value' id='trades'>0</div>
          </div>
        </div>
        <div class='card'>
          <div class='card-title'>Positions</div>
          <div class='data-item'>
            <div class='data-value' id='positions'>0</div>
          </div>
        </div>
        <div class='card'>
          <div class='card-title'>Account</div>
          <div class='data-item'>
            <div class='data-value' id='account'>—</div>
          </div>
        </div>
      </div>
      <div class='market-data'>
        <div class='card-title' style='margin: 1rem 0 0.5rem;'>Market Data</div>
        <div id='marketData'></div>
      </div>
    </div>
  </div>

  <!-- Common Footer -->
  <footer class='app-footer'>
    Made with ❤️ by <a href='https://ecomsense.in' target='_blank'>ecomsense.in</a>
  </footer>

  <!-- Settings Modal -->
  <div id='settingsModal' class='modal-overlay'>
    <div class='modal-content'>
      <div class='modal-header'>
        <span class='modal-title'>⚙️ Settings</span>
        <button class='modal-close' onclick='closeSettingsModal()'>×</button>
      </div>
      <div class='form-group'>
        <label class='form-label'>API Key</label>
        <input type='text' class='form-input' id='apiKey' placeholder='Enter API key...'>
      </div>
      <div class='form-group'>
        <label class='form-label'>Max Position Size</label>
        <input type='number' class='form-input' id='maxPosition' placeholder='100'>
      </div>
      <div class='form-group'>
        <label class='form-label'>Stop Loss %</label>
        <input type='number' class='form-input' id='stopLoss' placeholder='0.5'>
      </div>
      <button class='btn-primary' onclick='saveAndRestart()'>Save & Restart</button>
    </div>
  </div>

  <!-- Logs Modal -->
  <div id='logsModal' class='modal-overlay'>
    <div class='modal-content'>
      <div class='modal-header'>
        <span class='modal-title'>📋 Logs</span>
        <button class='modal-close' onclick='closeLogsModal()'>×</button>
      </div>
      <div class='log-content' id='logContent'>Loading...</div>
      <button class='btn-primary' onclick='refreshLogs()'>Refresh</button>
    </div>
  </div>

  <script>
    /* === Common Modal Functions === */
    function openSettingsModal() { document.getElementById('settingsModal').style.display = 'flex'; }
    function closeSettingsModal() { document.getElementById('settingsModal').style.display = 'none'; }
    function openLogsModal() { document.getElementById('logsModal').style.display = 'flex'; refreshLogs(); }
    function closeLogsModal() { document.getElementById('logsModal').style.display = 'none'; }
    
    async function refreshLogs() {
      try {
        const resp = await fetch('/api/admin/logs');
        const data = await resp.json();
        document.getElementById('logContent').textContent = data.content || 'No logs available';
      } catch(e) {
        document.getElementById('logContent').textContent = 'Error loading logs: ' + e.message;
      }
    }
    
    /* === Settings: Only restart on Save === */
    async function saveAndRestart() {
      closeSettingsModal();
      await fetch('/api/logic/stop', { method: 'POST' });
      await new Promise(r => setTimeout(r, 500));
      await fetch('/api/logic/start', { method: 'POST' });
      window.location.reload();
    }
    
    /* === Restart Button === */
    async function restartLogic() {
      await fetch('/api/logic/stop', { method: 'POST' });
      await new Promise(r => setTimeout(r, 500));
      await fetch('/api/logic/start', { method: 'POST' });
      window.location.reload();
    }
    
    /* === Page-specific: Load Data === */
    async function loadData() {
      try {
        const schedResp = await fetch('/api/schedule');
        const sched = await schedResp.json();
        if (!sched.within_schedule || sched.paused) { window.location.href = '/'; return; }
        const status = await fetch('/api/logic/status').then(r => r.json());
        if (!status.running) { window.location.href = '/'; return; }
        
        document.getElementById('account').textContent = status.account_id || '—';
        document.getElementById('positions').textContent = status.active_positions || 0;
        
        const data = await fetch('/api/logic/data').then(r => r.json());
        document.getElementById('pnl').textContent = '₹' + data.total_pnl.toFixed(2);
        document.getElementById('pnl').className = 'data-value ' + (data.total_pnl >= 0 ? 'positive' : 'negative');
        document.getElementById('trades').textContent = data.trade_count;
        
        const marketDiv = document.getElementById('marketData');
        marketDiv.innerHTML = data.market_data.map(m => 
          '<div class=\"market-item\"><span class=\"symbol\">' + m.symbol + '</span><span class=\"price\">₹' + m.last + ' <span class=\"vol\">(' + m.volume.toFixed(0) + ')</span></span></div>'
        ).join('');
      } catch(e) { console.error(e); window.location.href = '/'; }
    }
    
    setInterval(loadData, 2000);
    loadData();
  </script>
</body>
</html>
